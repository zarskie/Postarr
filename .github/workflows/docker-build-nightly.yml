name: Build and Push Docker Image

permissions:
  contents: read
  packages: write
  actions: write

on:
  push:
    branches:
      - develop
    paths:
      - "postarr/**"
      - "modules/**"
      - "frontend/**"
      - "Dockerfile"
      - "**/package*.json"
      - "migrations/**"
      - "Payloads/**"
      - "entrypoint.sh"
      - "migrate_db.py"
      - "uv.lock"
      - "pyproject.toml"
      - "gunicorn.conf.py"
      - "progress.py"
  workflow_dispatch:
jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Get version
        id: get_version
        run: |
          VERSION=$(python -c 'import tomllib;print(tomllib.load(open("pyproject.toml","rb"))["project"]["version"])')
          echo "VERSION=$VERSION" >> $GITHUB_ENV

      - name: Check if version changed
        id: version_check
        run: |
          CHANGED=false
          if git log --format="%H" | grep -q "${{ github.event.before }}"; then 
            git diff ${{ github.event.before }} ${{ github.sha }} -- pyproject.toml | grep -q '^\+version\s*=' && CHANGED=true
          fi
          echo "changed=$CHANGED" >> $GITHUB_OUTPUT

      - name: Extract Metadata
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ghcr.io/zarskie/postarr
          tags: |
            type=raw,value=develop,enable=${{ steps.version_check.outputs.changed == 'true' }}
            type=raw,value=v${{ env.VERSION }},enable=${{ steps.version_check.outputs.changed == 'true' }}
            type=raw,value=nightly
            type=sha,format=short
          labels: |
            org.opencontainers.image.version=${{ env.VERSION }}.${{ github.run_number }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GHCR_PAT }}

      - name: Build and Push Docker Image
        uses: docker/build-push-action@v7
        with:
          context: .
          push: true
          platforms: linux/amd64,linux/arm64
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: |
            GIT_SHA=${{ github.sha }}
            GIT_RUN_NUMBER=${{ github.run_number }}

      - name: Show Docker image info
        run: |
          echo "Tags pushed: ${{ steps.meta.outputs.tags }}"
          echo "Labels: ${{ steps.meta.outputs.labels }}"
