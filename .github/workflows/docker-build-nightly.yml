name: Build and Push Docker Image

permissions:
  contents: read
  packages: write

on:
  push:
    branches:
      - develop
    paths:
      - "postarr/**"
      - "modules/**"
      - "frontend/**"
      - "Dockerfile"
      - "**/package*.json"
      - "migrations/**"
      - "Payloads/**"
      - "entrypoint.sh"
      - "migrate_db.py"
      - "poetry.lock"
      - "pyproject.toml"
      - "gunicorn.conf.py"
      - "progress.py"
  workflow_dispatch:
jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Get version
        run: echo "VERSION=$(grep '^version' pyproject.toml | head -1 | sed 's/.*= *"//' | sed 's/"//')" >> $GITHUB_ENV

      - name: Extract Metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/zarskie/postarr
          tags: |
            type=sha,prefix=,format=short
            type=raw,value=nightly
          labels: |
            org.opencontainers.image.version=${{ env.VERSION }}.${{ github.run_number }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v2
        with:
          driver-opts: |
            image=moby/buildkit:master

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GHCR_PAT }}

      - name: Build and Push Docker Image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          platforms: linux/amd64,linux/arm64
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=registry,ref=ghcr.io/zarskie/postarr:nightly
          cache-to: type=registry,ref=ghcr.io/zarskie/postarr:buildcache,mode=max
          build-args: |
            GIT_SHA=${{ github.sha }}
            GIT_RUN_NUMBER=${{ github.run_number }}

      - name: Show Docker image info
        run: |
          echo "Tags pushed: ${{ steps.meta.outputs.tags }}"
          echo "Labels: ${{ steps.meta.outputs.labels }}"
