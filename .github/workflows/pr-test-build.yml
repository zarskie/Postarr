name: PR Test Build

on:
  pull_request:
    types: [labeled, synchronize]

permissions:
  contents: read
  packages: write

jobs:
  build-and-push:
    if: contains(github.event.pull_request.labels.*.name, 'test-build')
    runs-on: ubuntu-latest

    steps:
      - name: Checkout PR
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha }}
          fetch-depth: 0

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GHCR_PAT }}

      - name: Extract Metadata
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ghcr.io/zarskie/postarr
          tags: |
            type=raw,value=pr-${{ github.event.pull_request.number }}
          labels: |
            org.opencontainers.image.version=pr-${{ github.event.pull_request.number }}.${{ github.run_number }}

      - name: Build and Push Docker Image
        uses: docker/build-push-action@v7
        with:
          context: .
          push: true
          platforms: linux/amd64,linux/arm64
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: |
            GIT_SHA=${{ github.event.pull_request.head.sha }}
            GIT_RUN_NUMBER=pr-${{ github.event.pull_request.number }}.${{ github.run_number }}

      - name: Show image info
        run: |
          echo "Tags pushed: ${{ steps.meta.outputs.tags }}"
          echo "Labels: ${{ steps.meta.outputs.labels }}"
